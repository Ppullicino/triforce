name: Android smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'clients/android/**'
      - 'clients/shared/**'
      - 'packages/protocol/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-smoke.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '9.4.1' }
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: npm ci
      - name: Unit, lint, and debug APK
        run: gradle -p clients/android testDebugUnitTest lintDebug assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: triforce-android-debug
          path: clients/android/app/build/outputs/apk/debug/app-debug.apk

  emulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '9.4.1' }
      - run: npm ci
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          disable-animations: true
          script: gradle -p clients/android connectedDebugAndroidTest
