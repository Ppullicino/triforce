name: Android smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'clients/android/**'
      - 'clients/shared/**'
      - 'packages/protocol/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-smoke.yml'

permissions:
  contents: read

concurrency:
  group: android-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '9.4.1' }
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: npm ci
      - run: npm run version:check
      - name: Unit, lint, and debug APK
        run: gradle -p clients/android testDebugUnitTest lintDebug assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: triforce-android-debug
          path: clients/android/app/build/outputs/apk/debug/app-debug.apk

  emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '9.4.1' }
      - run: npm ci
      - run: npm run version:check
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          # API 29 is inside the supported range and boots materially faster on
          # hosted runners; compile/target API coverage remains in the build job.
          api-level: 29
          arch: x86_64
          disable-animations: true
          script: |
            gradle -p clients/android assembleDebug || { echo '::error::Android APK assembly failed'; exit 1; }
            adb install -r clients/android/app/build/outputs/apk/debug/app-debug.apk || { echo '::error::Android APK installation failed'; exit 1; }
            adb shell am start -W -n com.triforce.remote/.MainActivity | tee /tmp/triforce-launch.txt
            sleep 3
            adb shell pidof com.triforce.remote || { failure=$(adb logcat -d -t 500 | grep -E 'FATAL EXCEPTION|AndroidRuntime|Caused by:' | tail -20 | tr '\n' ' '); echo "::error::Android process exited after launch: $failure"; exit 1; }
