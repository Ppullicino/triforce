name: Desktop smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'clients/desktop/**'
      - 'clients/shared/**'
      - 'packages/protocol/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/desktop-smoke.yml'

permissions:
  contents: read

jobs:
  native-check:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Verify synchronized release version
        run: npm run version:check
      - name: Verify shared client and protocol
        run: npm run test --workspace @triforce/client && npm run test --workspace @triforce/protocol && node --test test/server-protocol.test.js
      - name: Build shared client
        run: npm run build
      - name: Check native credential and window shell
        run: cargo test --manifest-path clients/desktop/src-tauri/Cargo.toml
      - name: Build debug desktop executable
        run: npm run build --workspace @triforce/desktop -- --debug --no-bundle
      - name: Launch desktop executable in headless smoke mode
        shell: pwsh
        run: |
          $name = if ($IsWindows) { "triforce-desktop.exe" } else { "triforce-desktop" }
          $path = Join-Path "clients/desktop/src-tauri/target/debug" $name
          & $path --smoke-test
          if ($LASTEXITCODE -ne 0) { throw "Desktop executable launch smoke failed" }
