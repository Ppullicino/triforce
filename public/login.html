<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in to Triforce</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #090d18; color: #eef3ff; }
    body { min-height: 100vh; display: grid; place-items: center; margin: 0; }
    form { width: min(28rem, calc(100% - 3rem)); display: grid; gap: 1rem; padding: 2rem; border: 1px solid #29334b; border-radius: 1rem; background: #11182a; }
    label { display: grid; gap: .5rem; } input, button { font: inherit; padding: .8rem; border-radius: .5rem; border: 1px solid #435173; }
    button { cursor: pointer; background: #496df2; color: white; font-weight: 700; } p { margin: 0; color: #ffb8b8; }
  </style>
</head>
<body>
  <form id="login">
    <h1>Sign in to Triforce</h1>
    <label>Access token <input name="token" type="password" required autocomplete="current-password" autofocus></label>
    <button type="submit">Sign in</button>
    <p id="error" role="alert" aria-live="polite"></p>
  </form>
  <script src="/login.js"></script>
</body>
</html>
